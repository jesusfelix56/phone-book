<p-dialog
  [visible]="visible"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [breakpoints]="{ '768px': '95vw' }"
  [style]="{ width: '38rem' }"
  styleClass="admin-contact-dialog"
>
  <ng-template pTemplate="header">
    <h3 class="dialogTitle">New contact</h3>
  </ng-template>

  <div class="form">
    <div class="field">
      <label class="label" for="firstNameInput">First name *</label>
      <input
        id="firstNameInput"
        pInputText
        type="text"
        class="input"
        [class.inputError]="isFieldInvalid('firstName')"
        [ngModel]="formModel.firstName"
        (ngModelChange)="updateField('firstName', $event)"
      />
      <small *ngIf="getFieldError('firstName') as error" class="error">{{ error }}</small>
    </div>

    <div class="field">
      <label class="label" for="lastNameInput">Last name *</label>
      <input
        id="lastNameInput"
        pInputText
        type="text"
        class="input"
        [class.inputError]="isFieldInvalid('lastName')"
        [ngModel]="formModel.lastName"
        (ngModelChange)="updateField('lastName', $event)"
      />
      <small *ngIf="getFieldError('lastName') as error" class="error">{{ error }}</small>
    </div>

    <div class="field">
      <label class="label" for="phoneInput">Phone *</label>
      <input
        id="phoneInput"
        pInputText
        type="text"
        class="input"
        [class.inputError]="isFieldInvalid('phone')"
        [ngModel]="formModel.phone"
        (ngModelChange)="updateField('phone', $event)"
      />
      <small *ngIf="getFieldError('phone') as error" class="error">{{ error }}</small>
    </div>

    <div class="field">
      <label class="label" for="emailInput">Email *</label>
      <input
        id="emailInput"
        pInputText
        type="email"
        class="input"
        [class.inputError]="isFieldInvalid('email')"
        [ngModel]="formModel.email"
        (ngModelChange)="updateField('email', $event)"
      />
      <small *ngIf="getFieldError('email') as error" class="error">{{ error }}</small>
    </div>

    <div class="field">
      <label class="label" for="jobTitleInput">Job title *</label>
      <input
        id="jobTitleInput"
        pInputText
        type="text"
        class="input"
        [class.inputError]="isFieldInvalid('jobTitle')"
        [ngModel]="formModel.jobTitle"
        (ngModelChange)="updateField('jobTitle', $event)"
      />
      <small *ngIf="getFieldError('jobTitle') as error" class="error">{{ error }}</small>
    </div>

    <div class="field">
      <label class="label" for="addressInput">Address</label>
      <input
        id="addressInput"
        pInputText
        type="text"
        class="input"
        [ngModel]="formModel.address"
        (ngModelChange)="updateField('address', $event)"
      />
    </div>
  </div>

  <div class="dialogActions">
    <button pButton type="button" label="Cancel" severity="secondary" (click)="close()"></button>
    <button pButton type="button" label="Save" (click)="save.emit()"></button>
  </div>
</p-dialog>
