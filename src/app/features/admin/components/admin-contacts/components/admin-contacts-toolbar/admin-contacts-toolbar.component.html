<header class="top">
  <div class="titleBlock">
    <h1 class="title">Admin Contacts</h1>
    <p class="subtitle">Create, edit and remove contacts</p>
  </div>

  <button
    pButton
    type="button"
    label="Add contact"
    icon="pi pi-plus"
    (click)="addContact.emit()"
  ></button>
</header>

<div *ngIf="selectedCount > 0" class="selectionBar">
  <span class="selectionText">
    <i class="pi pi-check-square"></i> {{ selectedCount }} selected
  </span>
  <button
    pButton
    type="button"
    label="Delete selected"
    icon="pi pi-trash"
    severity="danger"
    (click)="deleteSelected.emit()"
  ></button>
</div>

<div class="tableTools">
  <p-iconField class="search">
    <p-inputIcon styleClass="pi pi-search"></p-inputIcon>
    <input
      pInputText
      type="text"
      class="input"
      placeholder="Search name, phone, email or job title"
      (input)="onGlobalFilterInput($event)"
    />
  </p-iconField>

  <p-multiSelect
    class="columns"
    [options]="columns"
    [ngModel]="selectedColumns"
    (ngModelChange)="onColumnsChange($event)"
    optionLabel="header"
    [filter]="false"
    display="chip"
    placeholder="Columns"
    selectedItemsLabel="{0} columns selected"
  ></p-multiSelect>
</div>
