<section class="view" id="adminContactsView">
  <app-admin-contacts-toolbar
    [selectedCount]="selectedContacts.length"
    [columns]="columns"
    [selectedColumns]="selectedColumns"
    (addContact)="openCreate()"
    (deleteSelected)="openDeleteSelected()"
    (selectedColumnsChange)="selectedColumns = $event"
    (globalFilterChange)="onGlobalFilterChange($event)"
  ></app-admin-contacts-toolbar>

  <app-admin-contacts-table
    [contacts]="contacts"
    [selectedColumns]="selectedColumns"
    [selectedContacts]="selectedContacts"
    (selectedContactsChange)="selectedContacts = $event"
    (rowEditInit)="onRowEditInit($event)"
    (rowEditSave)="onRowEditSave($event)"
    (rowEditCancel)="onRowEditCancel($event)"
    (deleteContact)="openDelete($event)"
  ></app-admin-contacts-table>

  <app-contact-form-dialog
    [(visible)]="contactDialogVisible"
    [formModel]="formModel"
    [formSubmitted]="formSubmitted"
    (formModelChange)="updateFormModel($event)"
    (save)="save()"
    (cancel)="closeFormDialog()"
  ></app-contact-form-dialog>

  <app-confirm-delete-dialog
    [(visible)]="deleteDialogVisible"
    [title]="deleteDialogTitle"
    [message]="deleteDialogMessage"
    [confirmLabel]="deleteDialogConfirmLabel"
    (confirm)="confirmDeleteDialog()"
  ></app-confirm-delete-dialog>
</section>
